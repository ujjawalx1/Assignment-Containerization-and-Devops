networks:
  ipvlan_net:
    external: true

volumes:
  pgdata:

services:
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: pa1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      ipvlan_net:
        ipv4_address: 192.168.170.11
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pa1_backend
    restart: unless-stopped
    environment:
      DB_HOST: 192.168.170.11
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
    networks:
      ipvlan_net:
        ipv4_address: 192.168.170.10
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
