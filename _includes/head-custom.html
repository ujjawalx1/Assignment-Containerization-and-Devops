<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  // Initialize mermaid but don't auto-start — we need to convert code blocks first.
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  // Jekyll renders ```mermaid as <pre><code class="language-mermaid">
  // Mermaid expects <pre class="mermaid"> or <div class="mermaid">
  window.addEventListener('load', function () {
    var codeBlocks = document.querySelectorAll('code.language-mermaid');
    codeBlocks.forEach(function (codeEl) {
      var pre = codeEl.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeEl.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
    mermaid.run();
  });
</script>
